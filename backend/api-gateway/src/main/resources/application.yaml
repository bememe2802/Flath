server:
  port: 8888

app:
  api-prefix:

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity_service
          uri: http://localhost:8080
          predicates:
            - Path=/identity/**
          filters:
            - StripPrefix=1
        - id: profile_service
          uri: http://localhost:8081
          predicates:
            - Path=/profile/users/**
          filters:
            - StripPrefix=1
        - id: notification_service
          uri: http://localhost:8082
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1
        - id: post_service
          uri: http://localhost:8083
          predicates:
            - Path=/post/**
          filters:
            - StripPrefix=1
        - id: file_service
          uri: http://localhost:8084
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1
        - id: chat_service
          uri: http://localhost:8085
          predicates:
            - Path=/chat/**
          filters:
            - StripPrefix=1
        - id: study_service
          uri: http://localhost:8086
          predicates:
            - Path=/study/**
          filters:
            - StripPrefix=1
        - id: newsfeed_service
          uri: http://localhost:8087
          predicates:
            - Path=/newsfeed/**
          filters:
            - StripPrefix=1
