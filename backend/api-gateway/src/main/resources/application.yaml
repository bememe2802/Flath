server:
  port: 8888

app:
  api-prefix: /api/v1

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity_service
          uri: http://identity-service:8080
          predicates:
          - Path=${app.api-prefix}/identity/**
          filters:
          - StripPrefix=2
        - id: profile_service
          uri: http://profile-service:8081
          predicates:
          - Path=${app.api-prefix}/profile/users/**
          filters:
          - StripPrefix=2
        - id: notification_service
          uri: http://notification-service:8082
          predicates:
            - Path=${app.api-prefix}/notification/**
          filters:
            - StripPrefix=2
        - id: post_service
          uri: http://post-service:8083
          predicates:
            - Path=${app.api-prefix}/post/**
          filters:
            - StripPrefix=2
        - id: file_service
          uri: http://file-service:8084
          predicates:
            - Path=${app.api-prefix}/file/**
          filters:
            - StripPrefix=2
        - id: chat_websocket_service
          uri: ws://chat-service:8085
          predicates:
            - Path=${app.api-prefix}/chat/ws,${app.api-prefix}/chat/ws/**
          filters:
            - StripPrefix=2
        - id: chat_service
          uri: http://chat-service:8085
          predicates:
            - Path=${app.api-prefix}/chat/**
          filters:
            - StripPrefix=2
        - id: study_service
          uri: http://study-service:8086
          predicates:
            - Path=${app.api-prefix}/study/**
          filters:
            - StripPrefix=2
        - id: newsfeed_service
          uri: http://newsfeed-service:8087
          predicates:
            - Path=${app.api-prefix}/newsfeed/**
          filters:
            - StripPrefix=2
