server:
  port: 8086
  servlet:
    context-path: /study

spring:
  application:
    name: study-service
  datasource:
    url: "jdbc:mysql://localhost:3306/backend_study?createDatabaseIfNotExist=true"
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  services:
    profile:
      url: http://localhost:8081/profile
